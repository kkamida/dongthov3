<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bảo mật truy cập</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1b5e20, #43a047);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    background: white;
    color: #333;
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #388e3c;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1b5e20;
}

.error {
    color: red;
    margin-top: 10px;
}

.gear {
    position: fixed;
    top: 15px;
    right: 15px;
    font-size: 22px;
    cursor: pointer;
}

.logo-wrapper {
    position: absolute;
    top: 100px;
    width: 100%;
    text-align: center;
}

.logo {
    width: 150px;
}

</style>
</head>

<body>

<div class="gear" onclick="showAdminLogin()">⚙️</div>
<div class="logo-wrapper">
    <img src="logo.png" class="logo">
</div>

<!-- LOGIN USER -->
<div class="container" id="loginBox">
	<h2>Nhập mật khẩu</h2>
    <input type="password" id="password" placeholder="Mật khẩu">
    <button onclick="checkPassword()">Truy cập</button>
    <div class="error" id="error"></div>
</div>

<!-- LOGIN ADMIN -->
<div class="container" id="adminLogin" style="display:none;">
    <h2>Đăng nhập quản trị</h2>
    <input type="text" id="adminUser" placeholder="User">
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="checkAdmin()">Đăng nhập</button>
    <button onclick="back()">Quay lại</button>
    <div class="error" id="adminError"></div>
</div>

<!-- ADMIN PANEL -->
<div class="container" id="adminBox" style="display:none;">
    <h2>Cấu hình</h2>

    <div style="text-align:left; margin-top:10px;">
        <label style="font-size:14px;">Mật khẩu mới</label>
        <input type="password" id="newPass" placeholder="Nhập mật khẩu mới">
    </div>

    <div style="text-align:left; margin-top:15px;">
        <label style="font-size:14px;">Link truy cập sau khi đúng mật khẩu</label>
        <input type="text" id="newLink" placeholder="Ví dụ: https://congan.tuyenquang.gov.vn">
    </div>
	<div style="text-align:left; margin-top:15px;">
        <button onclick="saveSettings()">Lưu</button>
		<button onclick="back()">Quay lại</button>
    </div>

<script>
// mặc định
let version = "3"; // tăng số này mỗi lần đổi pass
if (localStorage.getItem("version") !== version) {
    localStorage.setItem("sitePass", "Dt@123");
    localStorage.setItem("siteLink", "https://drive.google.com/drive/folders/11EbcXeaZfR66ZOEpEpJFqclW6txlwxHx?usp=sharing");
    localStorage.setItem("version", version);
}

// ===== USER LOGIN =====
function checkPassword() {
    let input = document.getElementById("password").value;
    let correct = localStorage.getItem("sitePass");

if (input === correct) {
    let url = localStorage.getItem("siteLink");
    url += (url.includes("?") ? "&" : "?") + "t=" + Date.now();
    window.location.href = url;
} else {
    document.getElementById("error").innerText = "Sai mật khẩu!";
}
}

// ===== ADMIN FLOW =====
function showAdminLogin() {
    hideAll();
    document.getElementById("adminLogin").style.display = "block";
}

function checkAdmin() {
    let user = document.getElementById("adminUser").value;
    let pass = document.getElementById("adminPass").value;

    if (user === "admin" && pass === "@dmin123") {
        hideAll();
        document.getElementById("adminBox").style.display = "block";

        document.getElementById("newPass").value = localStorage.getItem("sitePass");
        document.getElementById("newLink").value = localStorage.getItem("siteLink");
    } else {
        document.getElementById("adminError").innerText = "Sai tài khoản!";
    }
}

function saveSettings() {
    localStorage.setItem("sitePass", document.getElementById("newPass").value);
    localStorage.setItem("siteLink", document.getElementById("newLink").value);
    alert("Đã lưu!");
}

function back() {
    hideAll();
    document.getElementById("loginBox").style.display = "block";
}

function hideAll() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminLogin").style.display = "none";
    document.getElementById("adminBox").style.display = "none";
}
</script>
</body>
</html>
